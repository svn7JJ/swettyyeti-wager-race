<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWETTYYETI - Wager Race</title>
<meta property="og:title" content="SwettyYeti Wager Race - Live Leaderboard">
<meta property="og:description" content="Who's winning? Check the live wager race standings!">
<meta name="theme-color" content="#00ff88">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07090e;
    --card: rgba(255,255,255,0.028);
    --card-hi: rgba(255,255,255,0.055);
    --bdr: rgba(255,255,255,0.055);
    --bdr-hi: rgba(255,255,255,0.12);
    --g1: #00ff88;
    --g2: #00e5ff;
    --gold: #ffd54f;
    --gold2: #ffab00;
    --silver: #b0bec5;
    --bronze: #ff8a65;
    --t1: #f4f5f7;
    --t2: #9aa3b0;
    --t3: #4a5568;
    --red: #ff5252;
    --fd: 'Outfit', sans-serif;
    --fm: 'JetBrains Mono', monospace;
  }

  body { background: var(--bg); color: #c8cdd5; font-family: var(--fd); min-height: 100vh; }

  .bg-glow {
    position: fixed; top: -35%; left: 50%; transform: translateX(-50%);
    width: 110%; height: 70%; border-radius: 50%; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse, rgba(0,255,136,0.035) 0%, rgba(0,229,255,0.015) 40%, transparent 70%);
  }
  .bg-lines {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.35;
  }

  .main { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 32px 20px 24px; }

  /* Header */
  .hdr { text-align: center; margin-bottom: 24px; }
  .brand-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--fm); font-size: 11px; font-weight: 600;
    color: var(--g1); letter-spacing: 4px;
    padding: 6px 18px; border-radius: 24px;
    background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.12);
    margin-bottom: 16px;
  }
  .brand-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--g1); animation: blink 2s ease infinite;
  }
  .race-title {
    font-size: 30px; font-weight: 800; color: var(--t1);
    letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 6px;
  }
  .race-title span {
    background: linear-gradient(135deg, var(--g1), var(--g2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .race-sub { font-size: 15px; color: var(--t2); font-weight: 400; margin-bottom: 16px; }

  /* Prize pool banner */
  .prize-pool-banner {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 20px; border-radius: 24px; margin-bottom: 16px;
    background: linear-gradient(135deg, rgba(255,213,79,0.08), rgba(255,171,0,0.03));
    border: 1px solid rgba(255,213,79,0.15);
    font-family: var(--fm); font-size: 13px; font-weight: 700;
    color: var(--gold); letter-spacing: 1px;
  }
  .prize-pool-banner svg { width: 16px; height: 16px; }

  /* Status pill */
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--fm); font-size: 10px; font-weight: 600;
    padding: 4px 12px; border-radius: 20px; letter-spacing: 1.5px;
  }
  .status-live { color: var(--g1); background: rgba(0,255,136,0.07); border: 1px solid rgba(0,255,136,0.15); }
  .status-ended { color: var(--red); background: rgba(255,82,82,0.07); border: 1px solid rgba(255,82,82,0.15); }
  .status-upcoming { color: var(--g2); background: rgba(0,229,255,0.07); border: 1px solid rgba(0,229,255,0.12); }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: blink 2s ease infinite; }

  /* Countdown */
  .countdown { display: flex; justify-content: center; gap: 8px; margin: 14px 0 20px; }
  .cd-unit {
    text-align: center; min-width: 56px; padding: 10px 8px 7px;
    border-radius: 10px; background: var(--card); border: 1px solid var(--bdr);
  }
  .cd-num { font-family: var(--fm); font-size: 22px; font-weight: 700; color: var(--t1); }
  .cd-label { font-size: 9px; font-weight: 600; color: var(--t3); letter-spacing: 2px; margin-top: 2px; }

  /* Stats grid */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 20px; }
  .stat {
    padding: 12px 10px; border-radius: 10px; text-align: center;
    background: var(--card); border: 1px solid var(--bdr);
  }
  .stat-val { font-family: var(--fm); font-size: 16px; font-weight: 700; margin-bottom: 1px; }
  .stat-lbl { font-size: 10px; font-weight: 500; color: var(--t3); letter-spacing: 1px; }

  /* Prizes */
  .prizes { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
  .prize {
    display: flex; align-items: center; gap: 8px; padding: 8px 14px;
    border-radius: 10px; background: var(--card); border: 1px solid var(--bdr);
  }
  .prize-icon { width: 16px; height: 16px; }
  .prize-txt { font-size: 12px; font-weight: 500; color: var(--t2); }
  .prize-amt { font-family: var(--fm); font-weight: 700; font-size: 13px; }

  /* Ticker */
  .ticker-wrap {
    overflow: hidden; margin-bottom: 20px; border-radius: 10px;
    background: rgba(0,255,136,0.03); border: 1px solid rgba(0,255,136,0.08); padding: 8px 0;
  }
  .ticker {
    display: flex; gap: 32px; white-space: nowrap; width: max-content;
    animation: scroll 30s linear infinite;
  }
  .ticker-item {
    font-size: 12px; font-weight: 500; color: var(--t2);
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .ticker-item .hi { color: var(--g1); font-family: var(--fm); font-weight: 700; }
  .ticker-item .amt { color: var(--gold); font-family: var(--fm); font-weight: 600; }

  /* Leaderboard entries */
  .lb { display: flex; flex-direction: column; gap: 3px; }

  .entry {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-radius: 12px; cursor: default;
    background: var(--card); border: 1px solid var(--bdr);
    transition: all 0.25s; animation: slideIn 0.4s ease forwards; opacity: 0;
  }
  .entry:hover { background: var(--card-hi); border-color: var(--bdr-hi); transform: translateY(-1px); }
  .entry.r1 {
    padding: 16px 18px;
    background: linear-gradient(135deg, rgba(255,213,79,0.055), rgba(255,171,0,0.015));
    border: 1px solid rgba(255,213,79,0.12);
  }
  .entry.r1:hover { border-color: rgba(255,213,79,0.25); }
  .entry.r2 { background: linear-gradient(135deg, rgba(176,190,197,0.035), transparent); border-color: rgba(176,190,197,0.08); }
  .entry.r3 { background: linear-gradient(135deg, rgba(255,138,101,0.035), transparent); border-color: rgba(255,138,101,0.08); }

  .rank-num {
    flex-shrink: 0; width: 24px; text-align: center;
    font-family: var(--fm); font-weight: 700; font-size: 13px; color: var(--t3);
  }
  .r1 .rank-num { color: var(--gold); font-size: 16px; }
  .r2 .rank-num { color: var(--silver); font-size: 15px; }
  .r3 .rank-num { color: var(--bronze); font-size: 15px; }

  .avatar {
    flex-shrink: 0; width: 40px; height: 40px; border-radius: 10px;
    overflow: hidden; border: 1.5px solid rgba(255,255,255,0.06); position: relative;
  }
  .r1 .avatar { width: 48px; height: 48px; border-radius: 12px; border-color: rgba(255,213,79,0.2); }
  .r2 .avatar { border-color: rgba(176,190,197,0.12); }
  .r3 .avatar { border-color: rgba(255,138,101,0.12); }
  .avatar img { display: block; width: 100%; height: 100%; }
  .active-dot {
    position: absolute; bottom: 2px; right: 2px; width: 8px; height: 8px;
    border-radius: 50%; border: 1.5px solid var(--bg);
  }
  .active-dot.on { background: var(--g1); }
  .active-dot.off { background: #555; }

  .player-info { flex: 1; min-width: 0; }
  .name-row { display: flex; align-items: center; gap: 6px; }
  .player-name {
    font-weight: 600; font-size: 14px; color: var(--t1); letter-spacing: 0.2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .r1 .player-name { font-size: 17px; font-weight: 700; }

  .tag {
    font-size: 9px; font-family: var(--fm); font-weight: 600;
    padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px; flex-shrink: 0;
  }
  .tag-whale { color: #ce93d8; background: rgba(206,147,216,0.1); border: 1px solid rgba(206,147,216,0.15); }
  .tag-active { color: var(--g1); background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.12); }

  .bar-wrap { height: 3px; border-radius: 2px; margin-top: 5px; background: rgba(255,255,255,0.025); overflow: hidden; }
  .bar-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--g1), var(--g2)); transition: width 0.6s;
  }
  .r1 .bar-fill { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
  .r2 .bar-fill { background: linear-gradient(90deg, var(--silver), #78909c); }
  .r3 .bar-fill { background: linear-gradient(90deg, var(--bronze), #e64a19); }

  .wager-col { flex-shrink: 0; text-align: right; }
  .wager-val { font-family: var(--fm); font-weight: 700; font-size: 14px; color: var(--g1); }
  .r1 .wager-val { font-size: 20px; color: var(--gold); }
  .r2 .wager-val { font-size: 16px; color: var(--silver); }
  .r3 .wager-val { font-size: 16px; color: var(--bronze); }
  .bets-count { font-size: 11px; color: var(--t3); margin-top: 1px; font-weight: 500; }

  .sep { height: 1px; margin: 10px 0; background: linear-gradient(90deg, transparent, var(--bdr), transparent); }

  /* CTA */
  .cta { text-align: center; margin-top: 24px; }
  .cta a {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 36px; border-radius: 10px; background: var(--g1); color: var(--bg);
    font-family: var(--fd); font-size: 14px; font-weight: 700;
    letter-spacing: 1px; text-decoration: none; transition: all 0.2s; border: none;
  }
  .cta a:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .cta a svg { width: 14px; height: 14px; }

  /* Footer */
  .footer {
    text-align: center; margin-top: 24px; padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .footer-brand { font-family: var(--fm); font-size: 10px; font-weight: 600; color: var(--t3); letter-spacing: 3px; }
  .footer-sub { font-size: 10px; color: var(--t3); margin-top: 3px; opacity: 0.5; }

  /* States */
  .loading-state { text-align: center; padding: 60px 20px; }
  .spinner {
    width: 36px; height: 36px; border: 2px solid var(--bdr); border-top-color: var(--g1);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px;
  }
  .loading-text { font-family: var(--fm); font-size: 11px; color: var(--t3); letter-spacing: 2px; }

  .error-state {
    background: rgba(255,82,82,0.06); border: 1px solid rgba(255,82,82,0.15);
    border-radius: 12px; padding: 24px; text-align: center; margin: 20px 0;
  }
  .error-state h3 {
    color: var(--red); font-family: var(--fm); font-size: 12px;
    letter-spacing: 2px; margin-bottom: 8px;
  }
  .error-state p { color: var(--t2); font-size: 14px; line-height: 1.5; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--t3); font-size: 14px; }

  /* Animations */
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  @media (max-width: 600px) {
    .race-title { font-size: 22px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .countdown { gap: 6px; }
    .cd-unit { min-width: 48px; }
    .cd-num { font-size: 18px; }
    .entry { gap: 8px; padding: 10px 12px; }
    .r1 { padding: 14px 14px; }
    .player-name { font-size: 13px !important; }
    .wager-val { font-size: 13px !important; }
    .r1 .wager-val { font-size: 17px !important; }
    .bets-count { display: none; }
    .prize-pool-banner { font-size: 11px; padding: 6px 14px; }
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <svg class="bg-lines" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <line x1="15%" y1="0" x2="15%" y2="100%" stroke="rgba(255,255,255,0.012)" stroke-width="0.5"/>
    <line x1="38%" y1="0" x2="38%" y2="100%" stroke="rgba(255,255,255,0.012)" stroke-width="0.5"/>
    <line x1="62%" y1="0" x2="62%" y2="100%" stroke="rgba(255,255,255,0.012)" stroke-width="0.5"/>
    <line x1="85%" y1="0" x2="85%" y2="100%" stroke="rgba(255,255,255,0.012)" stroke-width="0.5"/>
  </svg>

  <div class="main">
    <div class="hdr">
      <div class="brand-pill"><span class="dot"></span><span id="brandName">SWETTYYETI</span></div>
      <h1 class="race-title" id="raceTitle">WAGER RACE</h1>
      <p class="race-sub" id="raceSub">Loading...</p>
      <div id="prizePoolBanner"></div>
      <div id="statusWrap"></div>
      <div class="countdown" id="countdown"></div>
    </div>

    <div class="stats" id="statsGrid"></div>
    <div id="prizesWrap"></div>
    <div id="tickerWrap"></div>
    <div id="leaderboard">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">LOADING RACE DATA...</div>
      </div>
    </div>
    <div id="ctaWrap"></div>

    <div class="footer">
      <div class="footer-brand"><span id="footerBrand">SWETTYYETI</span> &times; DAMBLE</div>
      <div class="footer-sub">Auto-refreshes every 60 seconds</div>
    </div>
  </div>

<script>
  // ─── Live Reload ───────────────────────────────────────────
  (function () {
    var es = new EventSource("/__reload");
    es.onmessage = function (e) {
      if (e.data === "reload") location.reload();
    };
  })();

  // ─── Helpers ───────────────────────────────────────────────
  function fmtUsd(n) {
    n = Number(n) || 0;
    if (n >= 1e6) return "$" + (n / 1e6).toFixed(2) + "M";
    if (n >= 1e3) return "$" + (n / 1e3).toFixed(1) + "K";
    return "$" + n.toFixed(2);
  }

  function fmtNum(n) {
    return Number(n || 0).toLocaleString();
  }

  function hashStr(s) {
    var h = 0;
    for (var i = 0; i < s.length; i++) {
      h = ((h << 5) - h) + s.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  // ─── Pixel Avatar Generator ────────────────────────────────
  var palettes = [
    ["#FF6B6B","#4ECDC4","#45B7D1","#96CEB4","#FFEAA7"],
    ["#A29BFE","#6C5CE7","#FD79A8","#FDCB6E","#00B894"],
    ["#F97F51","#6D214F","#182C61","#B33771","#58B19F"],
    ["#E17055","#00CEC9","#6C5CE7","#FDCB6E","#55A3F8"],
    ["#FF9FF3","#FECA57","#FF6348","#1DD1A1","#5F27CD"],
    ["#F368E0","#FF9F43","#0ABDE3","#10AC84","#EE5A24"],
    ["#48DBFB","#FF6B81","#7BED9F","#ECCC68","#A55EEA"],
    ["#FC5C65","#45AAF2","#26DE81","#FD9644","#4B6584"],
    ["#2BCBBA","#FA8231","#8854D0","#20BF6B","#EB3B5A"],
    ["#F7B731","#3867D6","#20BF6B","#FC5C65","#A55EEA"]
  ];

  function generateAvatar(name, size) {
    var h = hashStr(name);
    var pal = palettes[h % palettes.length];
    var c = document.createElement("canvas");
    c.width = size * 2;
    c.height = size * 2;
    var ctx = c.getContext("2d");
    ctx.fillStyle = "#0d1117";
    ctx.fillRect(0, 0, size * 2, size * 2);
    var grid = 5;
    var cell = (size * 2) / grid;
    var half = Math.ceil(grid / 2);
    var bits = [];
    for (var i = 0; i < half * grid; i++) {
      bits.push((h >>> (i % 30)) & 1 || (hashStr(name + i) % 3 === 0 ? 1 : 0));
    }
    for (var y = 0; y < grid; y++) {
      for (var x = 0; x < half; x++) {
        if (bits[y * half + x]) {
          ctx.fillStyle = pal[(x + y) % pal.length];
          ctx.globalAlpha = 0.75 + ((h >>> (x + y)) % 3) * 0.12;
          ctx.fillRect(x * cell, y * cell, cell, cell);
          ctx.fillRect((grid - 1 - x) * cell, y * cell, cell, cell);
        }
      }
    }
    ctx.globalAlpha = 1;
    return c.toDataURL();
  }

  // ─── State ─────────────────────────────────────────────────
  var config = null;
  var countdownInterval = null;

  // ─── Load Config ───────────────────────────────────────────
  async function loadConfig() {
    try {
      var res = await fetch("/race-config");
      config = await res.json();
    } catch (e) {
      config = {
        name: "WAGER RACE", subtitle: "Loading...",
        startDate: new Date().toISOString().slice(0, 10),
        endDate: new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10),
        prizes: [], signupLink: "", brandName: "SWETTYYETI"
      };
    }

    document.getElementById("brandName").textContent = config.brandName;
    document.getElementById("footerBrand").textContent = config.brandName;
    document.title = config.brandName + " - " + config.name;

    var parts = config.name.split(" ");
    if (parts.length > 2) {
      var mid = Math.ceil(parts.length / 2);
      document.getElementById("raceTitle").innerHTML =
        parts.slice(0, mid).join(" ") + "<br><span>" + parts.slice(mid).join(" ") + "</span>";
    } else {
      document.getElementById("raceTitle").innerHTML = "<span>" + config.name + "</span>";
    }
    document.getElementById("raceSub").textContent = config.subtitle;

    // Prize pool banner
    if (config.prizes && config.prizes.length > 0) {
      var totalPool = 0;
      config.prizes.forEach(function (p) {
        var num = parseFloat(p.reward.replace(/[^0-9.]/g, ""));
        if (!isNaN(num)) totalPool += num;
      });
      if (totalPool > 0) {
        document.getElementById("prizePoolBanner").innerHTML =
          '<div class="prize-pool-banner">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
          '<path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>' +
          '$' + totalPool.toFixed(0) + ' PRIZE POOL</div>';
      }

      var colors = ["#ffd54f", "#b0bec5", "#ff8a65"];
      var html = '<div class="prizes">';
      config.prizes.forEach(function (p, i) {
        var col = colors[i] || "#9aa3b0";
        html += '<div class="prize"><div class="prize-icon">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="' + col + '" stroke-width="2">' +
          '<path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg></div>' +
          '<div><div class="prize-txt">' + p.place + '</div>' +
          '<div class="prize-amt" style="color:' + col + '">' + p.reward + '</div></div></div>';
      });
      html += "</div>";
      document.getElementById("prizesWrap").innerHTML = html;
    }

    // CTA
    if (config.signupLink) {
      document.getElementById("ctaWrap").innerHTML =
        '<div class="cta"><a href="' + config.signupLink + '" target="_blank">' +
        'JOIN THE RACE <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
        'stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M7 17L17 7M17 7H7M17 7v10"/></svg></a></div>';
    }

    startCountdown();
  }

  // ─── Countdown ─────────────────────────────────────────────
  function startCountdown() {
    clearInterval(countdownInterval);
    updateCountdown();
    countdownInterval = setInterval(updateCountdown, 1000);
  }

  function updateCountdown() {
    var now = Date.now();
    var start = new Date(config.startDate + "T00:00:00").getTime();
    var end = new Date(config.endDate + "T00:00:00").getTime();
    var statusEl = document.getElementById("statusWrap");
    var cdEl = document.getElementById("countdown");
    var target, statusHtml;

    if (now < start) {
      target = start - now;
      statusHtml = '<span class="status-pill status-upcoming"><span class="status-dot"></span>STARTS SOON</span>';
    } else if (now <= end) {
      target = end - now;
      statusHtml = '<span class="status-pill status-live"><span class="status-dot"></span>LIVE</span>';
    } else {
      target = 0;
      statusHtml = '<span class="status-pill status-ended">RACE ENDED</span>';
    }

    statusEl.innerHTML = statusHtml;

    if (target <= 0) {
      cdEl.innerHTML = "";
      return;
    }

    var d = Math.floor(target / 86400000);
    var h = Math.floor((target % 86400000) / 3600000);
    var m = Math.floor((target % 3600000) / 60000);
    var s = Math.floor((target % 60000) / 1000);

    cdEl.innerHTML = [
      { v: d, l: "DAYS" }, { v: h, l: "HRS" }, { v: m, l: "MIN" }, { v: s, l: "SEC" }
    ].map(function (u) {
      return '<div class="cd-unit"><div class="cd-num">' +
        String(u.v).padStart(2, "0") + '</div><div class="cd-label">' + u.l + "</div></div>";
    }).join("");
  }

  // ─── Load Race Data ────────────────────────────────────────
  async function loadData() {
    var lbEl = document.getElementById("leaderboard");
    var statsEl = document.getElementById("statsGrid");
    var tickerEl = document.getElementById("tickerWrap");

    try {
      var res = await fetch("/race-data");
      var json = await res.json();

      if (json.error) throw new Error(json.error);

      var players = json.players || [];
      var stats = json.stats || {};

      // Stats Grid
      statsEl.innerHTML = [
        { v: fmtUsd(stats.totalWagered), l: "TOTAL WAGERED", c: "var(--g1)" },
        { v: fmtNum(stats.totalBets), l: "TOTAL BETS", c: "var(--g2)" },
        { v: String(stats.activeCount || 0) + "/" + String(stats.playerCount || 0), l: "ACTIVE", c: "#ce93d8" },
        { v: "$" + String(((stats.totalWagered || 0) / Math.max(stats.playerCount, 1)).toFixed(0)), l: "AVG / PLAYER", c: "var(--gold)" }
      ].map(function (s) {
        return '<div class="stat"><div class="stat-val" style="color:' + s.c + '">' + s.v +
          '</div><div class="stat-lbl">' + s.l + "</div></div>";
      }).join("");

      // Empty state
      if (players.length === 0) {
        lbEl.innerHTML = '<div class="empty-state">No players in the race yet. Be the first to join!</div>';
        tickerEl.innerHTML = "";
        return;
      }

      // Ticker
      var tickerItems = [];
      players.slice(0, 5).forEach(function (p) {
        tickerItems.push('<span class="ticker-item"><span class="hi">' + p.username +
          '</span> has wagered <span class="amt">' + fmtUsd(p.wagered) + '</span> total</span>');
      });
      players.forEach(function (p) {
        if (p.isActive) {
          tickerItems.push('<span class="ticker-item"><span class="hi">' + p.username +
            '</span> is <span class="amt">active</span> right now</span>');
        }
      });
      var tickerHtml = '<div class="ticker-wrap"><div class="ticker">' +
        tickerItems.join("") + tickerItems.join("") + "</div></div>";
      tickerEl.innerHTML = tickerHtml;

      // Leaderboard
      var maxWager = players[0].wagered || 1;
      var html = '<div class="lb">';

      players.forEach(function (p, i) {
        var rank = i + 1;
        var rankClass = rank <= 3 ? " r" + rank : "";
        var barPct = Math.max(2, (p.wagered / maxWager) * 100);
        var delay = (i * 0.05).toFixed(2);
        var av = generateAvatar(p.username, 24);

        var tagHtml = "";
        if (p.wagered > 100000) {
          tagHtml = '<span class="tag tag-whale">WHALE</span>';
        } else if (p.isActive) {
          tagHtml = '<span class="tag tag-active">ACTIVE</span>';
        }

        html += '<div class="entry' + rankClass + '" style="animation-delay:' + delay + 's">';
        html += '<div class="rank-num">' + rank + "</div>";
        html += '<div class="avatar"><img src="' + av + '" alt="' + p.username + '">';
        html += '<div class="active-dot ' + (p.isActive ? "on" : "off") + '"></div></div>';
        html += '<div class="player-info"><div class="name-row"><div class="player-name">' + p.username + "</div>" + tagHtml + "</div>";
        html += '<div class="bar-wrap"><div class="bar-fill" style="width:' + barPct + '%"></div></div></div>';
        html += '<div class="wager-col"><div class="wager-val">' + fmtUsd(p.wagered) + "</div>";
        html += '<div class="bets-count">' + fmtNum(p.bets) + " bets</div></div>";
        html += "</div>";

        if (rank === 3 && players.length > 3) {
          html += '<div class="sep"></div>';
        }
      });

      html += "</div>";
      lbEl.innerHTML = html;

    } catch (err) {
      console.error("Load error:", err);
      lbEl.innerHTML = '<div class="error-state"><h3>COULD NOT LOAD DATA</h3>' +
        "<p>" + (err.message || "Connection failed") + "</p></div>";
    }
  }

  // ─── Init ──────────────────────────────────────────────────
  async function init() {
    await loadConfig();
    await loadData();
  }
  init();

  setInterval(loadData, 60 * 1000);
</script>
</body>
</html>
