<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambros × LuxDrop · Wager Race</title>
<meta property="og:title" content="Gambros × LuxDrop Wager Race">
<meta property="og:description" content="Open cases on LuxDrop. Climb the leaderboard. Claim your share.">
<meta name="theme-color" content="#a855f7">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* base */
    --bg-0: #07050d;
    --bg-1: #0c0918;
    --bg-2: #120c22;
    --card: rgba(255, 255, 255, 0.035);
    --card-hi: rgba(255, 255, 255, 0.06);
    --bdr: rgba(255, 255, 255, 0.07);
    --bdr-hi: rgba(255, 255, 255, 0.16);

    /* brand */
    --p1: #a855f7;
    --p2: #7c3aed;
    --p3: #c084fc;
    --aqua: #22d3ee;

    /* podium */
    --gold-1: #fde68a;
    --gold-2: #f59e0b;
    --gold-3: #b45309;
    --silv-1: #f1f5f9;
    --silv-2: #94a3b8;
    --silv-3: #475569;
    --bronze-1: #fdba74;
    --bronze-2: #ea580c;
    --bronze-3: #7c2d12;

    /* text */
    --t1: #f4f4f6;
    --t2: #a1a1aa;
    --t3: #52525b;

    --fd: 'Sora', system-ui, sans-serif;
    --fm: 'JetBrains Mono', monospace;
  }

  html, body { background: var(--bg-0); color: var(--t1); font-family: var(--fd); min-height: 100vh; }
  body { overflow-x: hidden; }

  /* ════════════════════════ BACKGROUND ════════════════════════ */
  .bg-wrap { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bg-grad {
    position: absolute; inset: 0;
    background:
      radial-gradient(1200px 700px at 50% -8%, rgba(168, 85, 247, 0.20), transparent 60%),
      radial-gradient(900px 600px at 90% 30%, rgba(34, 211, 238, 0.10), transparent 60%),
      radial-gradient(900px 600px at 10% 60%, rgba(168, 85, 247, 0.12), transparent 60%),
      linear-gradient(180deg, #07050d 0%, #0a0815 40%, #07050d 100%);
  }
  .bg-grid {
    position: absolute; inset: 0; opacity: 0.25;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, #000 30%, transparent 80%);
  }
  /* slowly rotating glow orbs */
  .orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.55; animation: orbDrift 24s ease-in-out infinite; }
  .orb-a { width: 520px; height: 520px; top: -120px; left: -120px; background: radial-gradient(circle, rgba(168,85,247,0.5), transparent 70%); }
  .orb-b { width: 420px; height: 420px; bottom: -100px; right: -80px; background: radial-gradient(circle, rgba(34,211,238,0.35), transparent 70%); animation-delay: -6s; }
  .orb-c { width: 320px; height: 320px; top: 40%; left: 50%; background: radial-gradient(circle, rgba(245,158,11,0.25), transparent 70%); animation-delay: -12s; }

  @keyframes orbDrift {
    0%,100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, -30px) scale(1.08); }
  }

  /* particle canvas */
  #particles { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ════════════════════════ LAYOUT ════════════════════════ */
  .shell { position: relative; z-index: 2; max-width: 1180px; margin: 0 auto; padding: 36px 22px 80px; }

  /* ════════════════════════ HEADER ════════════════════════ */
  .hero { text-align: center; padding: 12px 0 16px; }

  .cobrand {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 8px 18px; border-radius: 100px;
    background: linear-gradient(135deg, rgba(168,85,247,0.10), rgba(34,211,238,0.06));
    border: 1px solid rgba(168,85,247,0.22);
    box-shadow: 0 0 30px rgba(168,85,247,0.15);
    font-family: var(--fm); font-weight: 700; letter-spacing: 3px; font-size: 12px;
  }
  .cobrand .left { color: var(--t1); }
  .cobrand .x { color: var(--p3); font-weight: 800; opacity: 0.9; }
  .cobrand .right { background: linear-gradient(135deg, var(--p3), var(--aqua)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .title {
    margin-top: 22px;
    font-size: clamp(46px, 8.5vw, 92px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 0.95;
  }
  .title .t-word {
    background: linear-gradient(120deg, #ffffff 0%, var(--p3) 40%, var(--aqua) 70%, #ffffff 100%);
    background-size: 220% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer { to { background-position: 220% 0; } }

  .subtitle { color: var(--t2); margin-top: 14px; font-size: clamp(14px, 1.4vw, 17px); font-weight: 400; }

  /* status / countdown row */
  .meta-row {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 12px;
    margin-top: 26px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 100px;
    font-family: var(--fm); font-size: 11px; font-weight: 700; letter-spacing: 1.6px;
    background: var(--card); border: 1px solid var(--bdr);
  }
  .pill.live { color: #4ade80; background: rgba(74, 222, 128, 0.07); border-color: rgba(74,222,128,0.22); }
  .pill.live .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 12px #4ade80; animation: pulse 1.6s ease-in-out infinite; }
  .pill.ended { color: #f87171; background: rgba(248,113,113,0.07); border-color: rgba(248,113,113,0.22); }
  .pill.ended .dot { width: 7px; height: 7px; border-radius: 50%; background: #f87171; }
  .pill.upcoming { color: var(--aqua); background: rgba(34,211,238,0.07); border-color: rgba(34,211,238,0.22); }
  .pill.upcoming .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--aqua); box-shadow: 0 0 12px var(--aqua); animation: pulse 1.6s ease-in-out infinite; }
  .pill.prize { color: var(--gold-1); background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(245,158,11,0.02)); border-color: rgba(245,158,11,0.28); }
  .pill.prize svg { width: 13px; height: 13px; }

  @keyframes pulse { 0%,100% { opacity:1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }

  /* countdown */
  .countdown { display: flex; justify-content: center; gap: 10px; margin-top: 26px; flex-wrap: wrap; }
  .cd-unit {
    position: relative;
    text-align: center;
    min-width: 86px; padding: 14px 12px 10px;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
    border: 1px solid var(--bdr);
    backdrop-filter: blur(8px);
    overflow: hidden;
  }
  .cd-unit::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(168,85,247,0.12), transparent 60%);
    pointer-events: none;
  }
  .cd-num {
    position: relative;
    font-family: var(--fm);
    font-size: 28px; font-weight: 700;
    background: linear-gradient(180deg, #ffffff, #c4b5fd);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .cd-lbl { position: relative; font-family: var(--fm); font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--t2); margin-top: 4px; text-transform: uppercase; }

  /* ════════════════════════ PODIUM ════════════════════════ */
  .podium-wrap {
    margin-top: 60px;
    display: grid;
    grid-template-columns: 1fr 1.18fr 1fr;
    gap: 18px;
    align-items: end;
    perspective: 1200px;
  }
  .podium-slot { display: flex; flex-direction: column; align-items: center; opacity: 0; animation: rise 0.9s ease forwards; }
  .podium-slot.slot-2 { animation-delay: 0.20s; }
  .podium-slot.slot-1 { animation-delay: 0.45s; }
  .podium-slot.slot-3 { animation-delay: 0.30s; }
  @keyframes rise { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .podium-card {
    width: 100%;
    border-radius: 22px;
    padding: 22px 18px 18px;
    text-align: center;
    background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012));
    border: 1px solid var(--bdr);
    backdrop-filter: blur(12px);
    position: relative;
    transition: transform 0.35s ease;
  }
  .podium-card:hover { transform: translateY(-4px); }

  /* avatar */
  .avatar-ring {
    position: relative;
    width: 96px; height: 96px;
    margin: 0 auto 14px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(from 0deg, var(--p2), var(--aqua), var(--p2));
    animation: spin 8s linear infinite;
  }
  .avatar-ring .av-inner {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--bg-1);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .avatar-ring img { width: 100%; height: 100%; display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .puser { font-size: 18px; font-weight: 700; color: var(--t1); margin-bottom: 4px; letter-spacing: -0.2px; word-break: break-word; }
  .pwage { font-family: var(--fm); font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .plbl { font-family: var(--fm); font-size: 10px; color: var(--t3); letter-spacing: 2px; margin-top: 2px; text-transform: uppercase; }
  .pprize {
    display: inline-block;
    margin-top: 14px;
    font-family: var(--fm); font-size: 13px; font-weight: 700; letter-spacing: 1px;
    padding: 6px 14px; border-radius: 100px;
  }

  /* podium base bars */
  .podium-base {
    width: 100%;
    margin-top: 14px;
    border-radius: 10px 10px 0 0;
    position: relative;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 14px;
    font-family: var(--fm); font-weight: 800; font-size: 38px; letter-spacing: -1px;
    overflow: hidden;
    border: 1px solid var(--bdr);
    border-bottom: none;
  }
  .podium-base::before {
    content: ""; position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 1px 12px;
    opacity: 0.6;
  }
  .podium-base::after {
    content: ""; position: absolute; left: 0; right: 0; top: 0; height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.18), transparent);
    pointer-events: none;
  }

  /* 1st */
  .slot-1 .podium-card {
    background: linear-gradient(180deg, rgba(245, 158, 11, 0.10), rgba(245, 158, 11, 0.02));
    border-color: rgba(245, 158, 11, 0.32);
    box-shadow: 0 18px 60px rgba(245, 158, 11, 0.18), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .slot-1 .avatar-ring { background: conic-gradient(from 0deg, var(--gold-2), var(--gold-1), var(--gold-2)); width: 120px; height: 120px; box-shadow: 0 0 60px rgba(245,158,11,0.45); }
  .slot-1 .puser { font-size: 22px; }
  .slot-1 .pwage { font-size: 30px; color: var(--gold-1); text-shadow: 0 0 22px rgba(245,158,11,0.5); }
  .slot-1 .pprize { background: linear-gradient(135deg, var(--gold-1), var(--gold-2)); color: #1a0e02; box-shadow: 0 0 25px rgba(245,158,11,0.45); }
  .slot-1 .podium-base {
    height: 180px;
    background: linear-gradient(180deg, rgba(245,158,11,0.18), rgba(180,83,9,0.06));
    border-color: rgba(245,158,11,0.32);
    color: var(--gold-1);
    text-shadow: 0 0 16px rgba(245,158,11,0.5);
  }
  /* crown */
  .crown {
    position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
    width: 56px; height: 56px;
    animation: bob 3.4s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(245,158,11,0.7));
  }
  @keyframes bob { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-6px); } }

  /* particles around 1st */
  .sparks { position: absolute; inset: -10px; pointer-events: none; }
  .spark { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: var(--gold-1); box-shadow: 0 0 12px var(--gold-1); opacity: 0; animation: sparkFloat 4s ease-in-out infinite; }
  .spark:nth-child(1) { left: 10%; top: 80%; animation-delay: 0s; }
  .spark:nth-child(2) { left: 30%; top: 60%; animation-delay: 0.6s; background: var(--aqua); box-shadow: 0 0 12px var(--aqua); }
  .spark:nth-child(3) { left: 60%; top: 90%; animation-delay: 1.2s; }
  .spark:nth-child(4) { left: 85%; top: 70%; animation-delay: 1.8s; background: var(--p3); box-shadow: 0 0 12px var(--p3); }
  .spark:nth-child(5) { left: 50%; top: 50%; animation-delay: 2.4s; }
  .spark:nth-child(6) { left: 20%; top: 40%; animation-delay: 3.0s; background: var(--aqua); box-shadow: 0 0 12px var(--aqua); }
  @keyframes sparkFloat {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-80px) scale(1.2); opacity: 0; }
  }

  /* 2nd */
  .slot-2 .podium-card {
    background: linear-gradient(180deg, rgba(203, 213, 225, 0.08), rgba(255,255,255,0.015));
    border-color: rgba(203, 213, 225, 0.22);
  }
  .slot-2 .avatar-ring { background: conic-gradient(from 0deg, var(--silv-2), var(--silv-1), var(--silv-2)); }
  .slot-2 .pwage { color: var(--silv-1); }
  .slot-2 .pprize { background: linear-gradient(135deg, var(--silv-1), var(--silv-2)); color: #0f172a; }
  .slot-2 .podium-base {
    height: 140px;
    background: linear-gradient(180deg, rgba(203,213,225,0.14), rgba(71,85,105,0.05));
    border-color: rgba(203, 213, 225, 0.22);
    color: var(--silv-1);
  }

  /* 3rd */
  .slot-3 .podium-card {
    background: linear-gradient(180deg, rgba(234, 88, 12, 0.08), rgba(124, 45, 18, 0.02));
    border-color: rgba(234, 88, 12, 0.25);
  }
  .slot-3 .avatar-ring { background: conic-gradient(from 0deg, var(--bronze-2), var(--bronze-1), var(--bronze-2)); }
  .slot-3 .pwage { color: var(--bronze-1); }
  .slot-3 .pprize { background: linear-gradient(135deg, var(--bronze-1), var(--bronze-2)); color: #2a1206; }
  .slot-3 .podium-base {
    height: 110px;
    background: linear-gradient(180deg, rgba(234,88,12,0.14), rgba(124,45,18,0.05));
    border-color: rgba(234,88,12,0.25);
    color: var(--bronze-1);
  }

  /* ════════════════════════ REST OF LEADERBOARD ════════════════════════ */
  .rest { margin-top: 48px; }
  .rest-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 4px 12px; border-bottom: 1px solid var(--bdr); margin-bottom: 10px;
  }
  .rest-head h3 { font-size: 14px; letter-spacing: 3px; font-weight: 600; color: var(--t2); text-transform: uppercase; }
  .rest-head .count { font-family: var(--fm); font-size: 12px; color: var(--t3); letter-spacing: 1px; }

  .row {
    display: grid;
    grid-template-columns: 56px 56px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    margin: 6px 0;
    border-radius: 14px;
    background: var(--card);
    border: 1px solid var(--bdr);
    transition: all 0.25s ease;
    opacity: 0;
    transform: translateY(10px);
    animation: rowIn 0.5s ease forwards;
  }
  @keyframes rowIn { to { opacity: 1; transform: translateY(0); } }
  .row:hover { background: var(--card-hi); border-color: var(--bdr-hi); transform: translateX(4px); }

  .r-rank {
    font-family: var(--fm);
    font-size: 16px; font-weight: 700;
    color: var(--t2);
    text-align: center;
    letter-spacing: -0.5px;
  }
  .r-av {
    width: 44px; height: 44px; border-radius: 50%;
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--bdr-hi);
    display: flex; align-items: center; justify-content: center;
  }
  .r-av img { width: 100%; height: 100%; display: block; }
  .r-name { font-size: 15px; font-weight: 600; color: var(--t1); word-break: break-word; }
  .r-sub { font-family: var(--fm); font-size: 11px; color: var(--t3); letter-spacing: 1px; margin-top: 2px; }
  .r-wage {
    font-family: var(--fm); font-size: 17px; font-weight: 700;
    color: var(--p3);
    letter-spacing: -0.5px;
    text-align: right;
  }

  /* ════════════════════════ EMPTY STATE ════════════════════════ */
  .empty {
    margin-top: 60px;
    padding: 60px 22px;
    text-align: center;
    border: 1px dashed var(--bdr-hi);
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  }
  .empty .chest {
    width: 90px; height: 90px; margin: 0 auto 22px;
    animation: float 3.6s ease-in-out infinite;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .empty h3 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .empty p { color: var(--t2); font-size: 15px; max-width: 460px; margin: 0 auto; }
  .empty .cta {
    display: inline-flex; align-items: center; gap: 10px;
    margin-top: 22px;
    padding: 12px 22px; border-radius: 100px;
    background: linear-gradient(135deg, var(--p2), var(--p1));
    color: white; font-weight: 700; font-size: 14px; letter-spacing: 1px;
    text-decoration: none;
    box-shadow: 0 8px 30px rgba(168,85,247,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .empty .cta:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(168,85,247,0.5); }

  /* ════════════════════════ FOOTER / CTA ════════════════════════ */
  .footer-cta {
    margin-top: 56px;
    text-align: center;
    padding: 36px 20px;
    border-radius: 22px;
    background: linear-gradient(135deg, rgba(168,85,247,0.10), rgba(34,211,238,0.04));
    border: 1px solid rgba(168,85,247,0.20);
    position: relative;
    overflow: hidden;
  }
  .footer-cta::before {
    content: ""; position: absolute; inset: -1px;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
    background-size: 250% 100%;
    animation: shimmerBg 5s linear infinite;
    pointer-events: none;
  }
  @keyframes shimmerBg { to { background-position: 250% 0; } }
  .footer-cta h2 { font-size: clamp(22px, 3vw, 30px); font-weight: 800; margin-bottom: 8px; }
  .footer-cta p { color: var(--t2); margin-bottom: 20px; font-size: 14px; }
  .footer-cta .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 26px; border-radius: 100px;
    background: linear-gradient(135deg, var(--p2), var(--p1));
    color: white; font-weight: 700; font-size: 15px; letter-spacing: 1px;
    text-decoration: none;
    box-shadow: 0 10px 36px rgba(168,85,247,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .footer-cta .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 42px rgba(168,85,247,0.55); }

  .legal { text-align: center; color: var(--t3); font-size: 12px; margin-top: 30px; font-family: var(--fm); letter-spacing: 1px; }
  .legal a { color: var(--t2); text-decoration: none; }
  .legal a:hover { color: var(--p3); }

  /* ════════════════════════ ERROR ════════════════════════ */
  .err {
    margin-top: 40px; padding: 22px;
    background: rgba(248,113,113,0.06);
    border: 1px solid rgba(248,113,113,0.22);
    border-radius: 14px;
    color: #fca5a5;
    font-family: var(--fm); font-size: 13px; text-align: center;
  }

  /* ════════════════════════ LOADING ════════════════════════ */
  .skeleton-row { height: 72px; background: var(--card); border-radius: 14px; margin: 8px 0; position: relative; overflow: hidden; }
  .skeleton-row::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    animation: skel 1.4s ease-in-out infinite;
  }
  @keyframes skel { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  /* ════════════════════════ MOBILE ════════════════════════ */
  @media (max-width: 760px) {
    .shell { padding: 24px 14px 60px; }
    .podium-wrap { grid-template-columns: 1fr; gap: 22px; }
    .slot-1 { order: -1; }
    .slot-2, .slot-3 { max-width: 360px; margin: 0 auto; }
    .podium-base { height: 80px !important; font-size: 32px; }
    .cd-unit { min-width: 70px; padding: 10px 8px 8px; }
    .cd-num { font-size: 22px; }
    .row { grid-template-columns: 40px 44px 1fr auto; gap: 12px; padding: 12px 14px; }
    .r-rank { font-size: 14px; }
    .r-wage { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="bg-wrap">
  <div class="bg-grad"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>
  <canvas id="particles"></canvas>
</div>

<main class="shell">
  <!-- HERO -->
  <section class="hero">
    <div class="cobrand">
      <span class="left" id="brand-left">GAMBROS</span>
      <span class="x">×</span>
      <span class="right" id="brand-right">LUXDROP</span>
    </div>

    <h1 class="title"><span class="t-word">WAGER&nbsp;RACE</span></h1>
    <p class="subtitle" id="subtitle">Open cases on LuxDrop. Climb the leaderboard. Claim your share.</p>

    <div class="meta-row">
      <span class="pill" id="status-pill"><span class="dot"></span><span id="status-label">LOADING</span></span>
      <span class="pill prize" id="prize-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l2.39 4.84L20 7.6l-4 3.9.94 5.5L12 14.4l-4.94 2.6.94-5.5L4 7.6l5.61-.76L12 2z"/>
        </svg>
        <span id="prize-label">$100 PRIZE POOL</span>
      </span>
    </div>

    <div class="countdown" id="countdown">
      <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-lbl">DAYS</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-lbl">HOURS</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-lbl">MINS</div></div>
      <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-lbl">SECS</div></div>
    </div>
  </section>

  <!-- PODIUM + LEADERBOARD -->
  <section id="leaderboard">
    <div id="loading-state">
      <div class="skeleton-row" style="margin-top: 60px;"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
    </div>
  </section>

  <!-- FOOTER CTA -->
  <section class="footer-cta">
    <h2>Ready to climb?</h2>
    <p>Sign up via Gambros to qualify for this race.</p>
    <a class="btn" id="signup-btn" href="#" target="_blank" rel="noopener">
      Join on LuxDrop
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
      </svg>
    </a>
  </section>

  <p class="legal">
    Gambros × LuxDrop · 18+ · Play responsibly · Updated <span id="updated">just now</span>
  </p>
</main>

<script>
  // ═══════════════════════════════════════════════════════════════════
  //  PARTICLE CANVAS — floating glow specks behind everything
  // ═══════════════════════════════════════════════════════════════════
  (function () {
    const c = document.getElementById('particles');
    if (!c || !c.getContext) return;
    const ctx = c.getContext('2d');
    let parts = [];
    const COLORS = ['rgba(168,85,247,0.55)', 'rgba(34,211,238,0.45)', 'rgba(245,158,11,0.35)', 'rgba(192,132,252,0.5)'];

    function size() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      c.width = window.innerWidth * dpr;
      c.height = window.innerHeight * dpr;
      c.style.width = window.innerWidth + 'px';
      c.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    function seed() {
      parts = [];
      const count = Math.min(80, Math.floor(window.innerWidth / 18));
      for (let i = 0; i < count; i++) {
        parts.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.8 + 0.4,
          vx: (Math.random() - 0.5) * 0.15,
          vy: -Math.random() * 0.25 - 0.05,
          a: Math.random() * 0.6 + 0.2,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          tw: Math.random() * Math.PI * 2,
        });
      }
    }
    function tick() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      for (const p of parts) {
        p.x += p.vx; p.y += p.vy; p.tw += 0.02;
        if (p.y < -10) { p.y = window.innerHeight + 10; p.x = Math.random() * window.innerWidth; }
        if (p.x < -10) p.x = window.innerWidth + 10;
        if (p.x > window.innerWidth + 10) p.x = -10;
        const a = p.a * (0.6 + 0.4 * Math.sin(p.tw));
        ctx.beginPath();
        ctx.fillStyle = p.color.replace(/[\d.]+\)$/, a.toFixed(2) + ')');
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      requestAnimationFrame(tick);
    }
    size(); seed(); tick();
    window.addEventListener('resize', () => { size(); seed(); });
  })();

  // ═══════════════════════════════════════════════════════════════════
  //  COUNTDOWN
  // ═══════════════════════════════════════════════════════════════════
  const END_DATE = new Date('2026-06-15T23:59:59Z');
  const START_DATE = new Date('2026-05-16T00:00:00Z');

  function pad(n) { return String(n).padStart(2, '0'); }
  function tickCountdown() {
    const now = new Date();
    const diff = END_DATE - now;
    const pill = document.getElementById('status-pill');
    const lbl = document.getElementById('status-label');
    if (now < START_DATE) {
      pill.className = 'pill upcoming';
      lbl.textContent = 'STARTS SOON';
    } else if (diff <= 0) {
      pill.className = 'pill ended';
      lbl.textContent = 'RACE ENDED';
      document.getElementById('cd-d').textContent = '00';
      document.getElementById('cd-h').textContent = '00';
      document.getElementById('cd-m').textContent = '00';
      document.getElementById('cd-s').textContent = '00';
      return;
    } else {
      pill.className = 'pill live';
      lbl.textContent = 'LIVE NOW';
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('cd-d').textContent = pad(d);
    document.getElementById('cd-h').textContent = pad(h);
    document.getElementById('cd-m').textContent = pad(m);
    document.getElementById('cd-s').textContent = pad(s);
  }
  tickCountdown();
  setInterval(tickCountdown, 1000);

  // ═══════════════════════════════════════════════════════════════════
  //  AVATARS — deterministic, unique per username
  // ═══════════════════════════════════════════════════════════════════
  // Pool of DiceBear styles so different names get clearly different looks.
  const AV_STYLES = ['avataaars', 'bottts', 'fun-emoji', 'micah', 'lorelei', 'adventurer', 'pixel-art', 'thumbs'];
  function hashName(s) {
    let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h);
  }
  function avatarUrl(name) {
    const seed = encodeURIComponent(name.toLowerCase());
    const style = AV_STYLES[hashName(name) % AV_STYLES.length];
    return `https://api.dicebear.com/9.x/${style}/svg?seed=${seed}&backgroundType=gradientLinear&backgroundColor=1e1b4b,7c3aed,a855f7,22d3ee,0c0918`;
  }
  // Inline fallback: colorful gradient initial when external avatars fail.
  function fallbackAvatar(name) {
    const h = hashName(name);
    const c1 = `hsl(${h % 360}, 70%, 60%)`;
    const c2 = `hsl(${(h * 7) % 360}, 70%, 50%)`;
    const initial = (name[0] || '?').toUpperCase();
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>` +
                `<defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>` +
                `<stop offset='0' stop-color='${c1}'/><stop offset='1' stop-color='${c2}'/></linearGradient></defs>` +
                `<rect width='100' height='100' fill='url(#g)'/>` +
                `<text x='50' y='62' font-family='Sora,sans-serif' font-weight='700' font-size='48' fill='white' text-anchor='middle'>${initial}</text>` +
                `</svg>`;
    return 'data:image/svg+xml;base64,' + btoa(svg);
  }

  // ═══════════════════════════════════════════════════════════════════
  //  FORMATTING + COUNT-UP
  // ═══════════════════════════════════════════════════════════════════
  function fmt(n) {
    return '$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function maskName(n) {
    if (!n) return '?????';
    if (n.length <= 3) return n[0] + '*'.repeat(Math.max(1, n.length - 1));
    return n.slice(0, 2) + '***' + n.slice(-1);
  }
  function animateCount(el, target, dur) {
    dur = dur || 1100;
    const start = performance.now();
    const from = 0;
    function step(t) {
      const p = Math.min(1, (t - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      const v = from + (target - from) * eased;
      el.textContent = fmt(v);
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // ═══════════════════════════════════════════════════════════════════
  //  RENDER
  // ═══════════════════════════════════════════════════════════════════
  let lastPrizes = [{ place: '1st', reward: '$100' }, { place: '2nd', reward: '—' }, { place: '3rd', reward: '—' }];

  function buildPodiumCard(player, rank, prize) {
    const order = rank === 1 ? 'slot-1' : rank === 2 ? 'slot-2' : 'slot-3';
    const placeNum = rank === 1 ? '1' : rank === 2 ? '2' : '3';

    const crown = rank === 1 ? `
      <div class="sparks">
        <span class="spark"></span><span class="spark"></span><span class="spark"></span>
        <span class="spark"></span><span class="spark"></span><span class="spark"></span>
      </div>
      <svg class="crown" viewBox="0 0 64 64" fill="none">
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#f59e0b"/>
          </linearGradient>
        </defs>
        <path d="M6 50 L10 22 L22 36 L32 14 L42 36 L54 22 L58 50 Z" fill="url(#cg)" stroke="#b45309" stroke-width="1.5" stroke-linejoin="round"/>
        <rect x="6" y="50" width="52" height="6" rx="2" fill="url(#cg)" stroke="#b45309" stroke-width="1.5"/>
        <circle cx="10" cy="20" r="3" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
        <circle cx="32" cy="12" r="3.5" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
        <circle cx="54" cy="20" r="3" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
      </svg>` : '';

    const avSrc = avatarUrl(player.username);
    const fb = fallbackAvatar(player.username);
    const wagerId = 'pw-' + rank;

    return `
      <div class="podium-slot ${order}">
        <div class="podium-card">
          ${crown}
          <div class="avatar-ring"><div class="av-inner">
            <img src="${avSrc}" alt="${player.username}" loading="lazy" onerror="this.onerror=null;this.src='${fb}'">
          </div></div>
          <div class="puser">${escapeHtml(player.username)}</div>
          <div class="pwage" id="${wagerId}">$0.00</div>
          <div class="plbl">WAGERED</div>
          <div class="pprize">${prize ? prize : '—'}</div>
        </div>
        <div class="podium-base">${placeNum}</div>
      </div>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function renderEmpty() {
    return `
      <div class="empty">
        <svg class="chest" viewBox="0 0 64 64" fill="none">
          <defs>
            <linearGradient id="chestG" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#a855f7"/><stop offset="1" stop-color="#22d3ee"/>
            </linearGradient>
          </defs>
          <rect x="6" y="22" width="52" height="32" rx="4" fill="url(#chestG)" opacity="0.18" stroke="#a855f7" stroke-width="2"/>
          <path d="M6 30 Q6 14 32 14 Q58 14 58 30" fill="none" stroke="#a855f7" stroke-width="2"/>
          <rect x="28" y="32" width="8" height="12" rx="2" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
          <circle cx="32" cy="36" r="1.4" fill="#7c2d12"/>
        </svg>
        <h3>No wagers yet</h3>
        <p>The race has only just begun — be the first to open a case on LuxDrop with code <strong style="color:var(--p3)">GAMBROS</strong> and you'll appear here.</p>
        <a class="cta" id="empty-cta" href="#" target="_blank" rel="noopener">
          Start wagering
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
          </svg>
        </a>
      </div>`;
  }

  function renderLeaderboard(players, prizes) {
    const root = document.getElementById('leaderboard');
    if (!players || players.length === 0) {
      root.innerHTML = renderEmpty();
      const cta = document.getElementById('empty-cta');
      if (cta) cta.href = (window.__signupLink || '#');
      return;
    }

    const top3 = players.slice(0, 3);
    // Build placeholders so podium always shows 3 slots.
    while (top3.length < 3) top3.push({ username: 'Awaiting...', wagered: 0, placeholder: true });

    const podiumHtml = `
      <div class="podium-wrap">
        ${buildPodiumCard(top3[1], 2, prizes[1] && prizes[1].reward)}
        ${buildPodiumCard(top3[0], 1, prizes[0] && prizes[0].reward)}
        ${buildPodiumCard(top3[2], 3, prizes[2] && prizes[2].reward)}
      </div>`;

    const rest = players.slice(3);
    const restHtml = rest.length === 0 ? '' : `
      <div class="rest">
        <div class="rest-head">
          <h3>Standings</h3>
          <span class="count">${players.length} PLAYER${players.length === 1 ? '' : 'S'}</span>
        </div>
        ${rest.map((p, i) => {
          const av = avatarUrl(p.username);
          const fb = fallbackAvatar(p.username);
          return `
            <div class="row" style="animation-delay:${0.05 * i}s">
              <div class="r-rank">#${p.rank}</div>
              <div class="r-av"><img src="${av}" alt="${escapeHtml(p.username)}" loading="lazy" onerror="this.onerror=null;this.src='${fb}'"></div>
              <div>
                <div class="r-name">${escapeHtml(p.username)}</div>
                <div class="r-sub">${(p.deposited > 0 ? fmt(p.deposited) + ' DEPOSITED' : '')}</div>
              </div>
              <div class="r-wage">${fmt(p.wagered)}</div>
            </div>`;
        }).join('')}
      </div>`;

    root.innerHTML = podiumHtml + restHtml;

    // Count-up the top 3 wager values
    top3.forEach((p, idx) => {
      const el = document.getElementById('pw-' + (idx + 1));
      if (el) {
        if (p.placeholder) el.textContent = '$0.00';
        else animateCount(el, Number(p.wagered) || 0, 1200 + idx * 200);
      }
    });
  }

  // ═══════════════════════════════════════════════════════════════════
  //  DATA FETCH
  // ═══════════════════════════════════════════════════════════════════
  async function loadConfig() {
    try {
      const r = await fetch('/race-config');
      if (!r.ok) return;
      const cfg = await r.json();
      if (cfg.subtitle) document.getElementById('subtitle').textContent = cfg.subtitle;
      if (cfg.prizePoolLabel) document.getElementById('prize-label').textContent = cfg.prizePoolLabel;
      if (cfg.brandLeft) document.getElementById('brand-left').textContent = cfg.brandLeft;
      if (cfg.brandRight) document.getElementById('brand-right').textContent = cfg.brandRight;
      if (cfg.signupLink) {
        document.getElementById('signup-btn').href = cfg.signupLink;
        window.__signupLink = cfg.signupLink;
      }
      if (cfg.prizes) lastPrizes = cfg.prizes;
      if (cfg.endDate) {
        const end = new Date(cfg.endDate);
        if (!isNaN(end)) { window.__endDate = end; }
      }
    } catch (_) {}
  }

  async function loadData() {
    try {
      const r = await fetch('/race-data');
      const json = await r.json();
      if (!r.ok) {
        document.getElementById('leaderboard').innerHTML =
          `<div class="err">${escapeHtml(json.error || 'Unable to load leaderboard.')}</div>` + renderEmpty();
        const cta = document.getElementById('empty-cta');
        if (cta) cta.href = (window.__signupLink || '#');
        return;
      }
      renderLeaderboard(json.players || [], lastPrizes);
      if (json.updatedAt) {
        document.getElementById('updated').textContent = new Date(json.updatedAt).toLocaleTimeString();
      }
    } catch (e) {
      document.getElementById('leaderboard').innerHTML = renderEmpty();
      const cta = document.getElementById('empty-cta');
      if (cta) cta.href = (window.__signupLink || '#');
    }
  }

  (async () => {
    await loadConfig();
    await loadData();
    setInterval(loadData, 60 * 1000);
  })();

  // ═══════════════════════════════════════════════════════════════════
  //  LIVE RELOAD (dev only — silently no-ops in production)
  // ═══════════════════════════════════════════════════════════════════
  try {
    const es = new EventSource('/__reload');
    es.onmessage = (e) => { if (e.data === 'reload') window.location.reload(); };
  } catch (_) {}
</script>

</body>
</html>
